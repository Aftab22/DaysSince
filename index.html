<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Days Since</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#1e3c72,#2a5298,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation:bg 18s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

body::before{
    content:"✨ ✨ ⭐ 🌙 ✨ ⭐";
    position:fixed;
    inset:0;
    opacity:.08;
    font-size:40px;
    letter-spacing:80px;
    line-height:120px;
    pointer-events:none;
}

.container{
    width:min(700px,92%);
    background:rgba(255,255,255,.14);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:28px;
    padding:35px;
    color:#fff;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

h1{
    text-align:center;
    font-size:2rem;
    margin-bottom:20px;
}

.exact{
    text-align:center;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,.12);
    margin-bottom:28px;
    animation:pulse 3s ease-in-out infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.02);
    }
}

#exactAge{
    font-size:1.5rem;
    font-weight:700;
    line-height:1.6;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:16px;
}

.card{
    background:rgba(255,255,255,.12);
    border-radius:18px;
    padding:22px;
    text-align:center;
}

.number{
    font-size:2.4rem;
    font-weight:700;
    margin-bottom:8px;
}

.label{
    font-size:1rem;
    opacity:.9;
}

.zodiac{
    margin-top:28px;
    background:rgba(255,255,255,.12);
    border-radius:18px;
    padding:20px;
    text-align:center;
    font-size:1.2rem;
}

.footer{
    margin-top:24px;
    text-align:center;
    opacity:.8;
    font-size:.95rem;
}

@media(max-width:600px){
    #exactAge{
        font-size:1.2rem;
    }

    .number{
        font-size:2rem;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>⏳ Days Since</h1>

<div class="exact">
<div id="exactAge"></div>
</div>

<div class="grid">

<div class="card">
<div class="number" id="days">0</div>
<div class="label">📅 Days</div>
</div>

<div class="card">
<div class="number" id="weeks">0</div>
<div class="label">🗓️ Weeks</div>
</div>

<div class="card">
<div class="number" id="months">0</div>
<div class="label">🌱 Months</div>
</div>

<div class="card">
<div class="number" id="years">0</div>
<div class="label">🎂 Years</div>
</div>

</div>

<div class="zodiac">
♊ Zodiac Sign: <strong>Gemini</strong>
</div>

<div class="footer">
✨ Every second is another tiny milestone.
</div>

</div>

<script>

const startDate = new Date(2026,5,16,3,46,0);

function update(){

    const now = new Date();

    const diff = now - startDate;

    const totalDays = Math.floor(diff / (1000*60*60*24));
    const totalWeeks = Math.floor(totalDays / 7);

    let years = now.getFullYear() - startDate.getFullYear();
    let months = now.getMonth() - startDate.getMonth();
    let days = now.getDate() - startDate.getDate();

    if(days < 0){
        months--;
        days += new Date(now.getFullYear(),now.getMonth(),0).getDate();
    }

    if(months < 0){
        years--;
        months += 12;
    }

    const totalMonths = years*12 + months;

    let anchor = new Date(startDate);

    anchor.setFullYear(anchor.getFullYear()+years);
    anchor.setMonth(anchor.getMonth()+months);

    let remaining = now-anchor;

    const d = Math.floor(remaining/(1000*60*60*24));
    remaining -= d*24*60*60*1000;

    const h = Math.floor(remaining/(1000*60*60));
    remaining -= h*60*60*1000;

    const m = Math.floor(remaining/(1000*60));
    remaining -= m*60*1000;

    const s = Math.floor(remaining/1000);

    document.getElementById("days").textContent=totalDays.toLocaleString();
    document.getElementById("weeks").textContent=totalWeeks.toLocaleString();
    document.getElementById("months").textContent=totalMonths.toLocaleString();
    document.getElementById("years").textContent=years.toLocaleString();

    document.getElementById("exactAge").innerHTML=
        `🎉 <strong>${years}</strong> Years •
        <strong>${months}</strong> Months •
        <strong>${d}</strong> Days<br><br>
        ⏰ ${String(h).padStart(2,"0")} :
        ${String(m).padStart(2,"0")} :
        ${String(s).padStart(2,"0")}`;
}

update();
setInterval(update,1000);

</script>

</body>
</html>
